<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Expense Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
    height:100vh;
    background:linear-gradient(120deg,#0f172a,#1e40af,#06b6d4);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:900px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.08);
    border-radius:25px;
    padding:30px;
    box-shadow:0 0 50px rgba(0,0,0,0.4);
}

.header{text-align:center;margin-bottom:25px;}
.header h1{font-size:34px}
.header p{opacity:.8}

.top{display:flex;gap:20px;margin-bottom:25px;}

.card{
    flex:1;
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:18px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:linear-gradient(45deg,#22c55e,#06b6d4);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}
button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #22c55e;
}

.total{
    text-align:center;
    font-size:28px;
    font-weight:700;
}

.list{
    max-height:280px;
    overflow:auto;
}
.exp{
    display:flex;
    justify-content:space-between;
    background:rgba(255,255,255,0.15);
    padding:12px;
    border-radius:12px;
    margin:8px 0;
}
.delete{
    background:#ef4444;
    padding:6px 12px;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>☁️ AWS Expense Dashboard</h1>
<p>3-Tier Architecture Demo Project</p>
</div>

<div class="top">
    <div class="card">
        <h3>Add Expense</h3>
        <input id="title" placeholder="Expense name">
        <input id="amount" placeholder="Amount ₹">
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card total">
        Total Spent 💸
        <div id="total">₹0</div>
    </div>
</div>

<h3>Recent Expenses</h3>
<div id="list" class="list"></div>

</div>



<script>

// ⭐⭐⭐ IMPORTANT ⭐⭐⭐
const API="http://app_server_pvt_ip/api.php?action=";


// ADD EXPENSE
function addExpense(){

    fetch(API+"add",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            title:document.getElementById("title").value,
            amount:document.getElementById("amount").value
        })
    })
    .then(res=>res.json())
    .then(res=>{
        console.log(res);
        document.getElementById("title").value="";
        document.getElementById("amount").value="";
        loadExpenses();
    });
}


// LOAD EXPENSES
function loadExpenses(){
    fetch(API+"list")
    .then(res=>res.json())
    .then(res=>{
        let html="";
        let total=0;

        res.data.forEach(e=>{
            total+=parseFloat(e.amount);

            html+=`
            <div class="exp">
                <div><b>${e.title}</b><br>₹${e.amount}</div>
                <div class="delete" onclick="del(${e.id})">Delete</div>
            </div>`;
        });

        document.getElementById("list").innerHTML=html;
        document.getElementById("total").innerHTML="₹"+total;
    });
}


// DELETE EXPENSE
function del(id){
    fetch(API+"delete&id="+id)
    .then(res=>res.json())
    .then(()=>loadExpenses());
}

loadExpenses();

</script>
</body>
</html>
